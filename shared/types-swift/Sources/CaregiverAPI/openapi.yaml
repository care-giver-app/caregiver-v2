openapi: 3.0.3
info:
  title: Caregiver API
  version: 0.1.0
  description: Caregiver v2 API contract — source of truth.
servers:
  - url: https://api.dev.example.com
    description: dev
  - url: https://api.example.com
    description: prod
security:
  - bearerAuth: []
paths:
  /health:
    get:
      operationId: getHealth
      summary: Health check
      description: Returns service health and build metadata.
      security: []
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Health'
  /flags:
    get:
      operationId: getFlags
      summary: Return evaluated feature flags
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Flags'
  /me:
    get:
      operationId: getMe
      summary: Current user and their care-group memberships
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Me'
        '401':
          $ref: '#/components/responses/Unauthorized'
  /care-groups:
    post:
      operationId: createCareGroup
      summary: Create a care group; caller becomes Admin
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateCareGroupRequest'
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CareGroupMembership'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
  /care-groups/{careGroupId}/invitations:
    post:
      operationId: createInvitation
      summary: Invite a user to the care group by email (admin only)
      parameters:
        - { name: careGroupId, in: path, required: true, schema: { type: string } }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateInvitationRequest'
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Invitation'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '409':
          $ref: '#/components/responses/Conflict'
  /care-groups/{careGroupId}/invitations/{token}:
    delete:
      operationId: revokeInvitation
      summary: Revoke a pending invitation (admin only)
      parameters:
        - { name: careGroupId, in: path, required: true, schema: { type: string } }
        - { name: token, in: path, required: true, schema: { type: string } }
      responses:
        '204':
          description: No Content
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
  /invitations/mine:
    get:
      operationId: listMyInvitations
      summary: Pending invitations for the caller's verified email
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/PendingInvitation'
        '401':
          $ref: '#/components/responses/Unauthorized'
  /invitations/{token}/accept:
    post:
      operationId: acceptInvitation
      summary: Accept an invitation by token; creates a membership
      parameters:
        - { name: token, in: path, required: true, schema: { type: string } }
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AcceptInvitationResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '410':
          $ref: '#/components/responses/Gone'
  /receivers:
    get:
      operationId: listReceivers
      summary: List receivers across the caller's groups (optionally one group)
      parameters:
        - { name: careGroupId, in: query, required: false, schema: { type: string } }
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: array
                items: { $ref: '#/components/schemas/Receiver' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
  /care-groups/{careGroupId}/receivers:
    post:
      operationId: createReceiver
      summary: Add a receiver to a care group (admin only)
      parameters:
        - { name: careGroupId, in: path, required: true, schema: { type: string } }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/CreateReceiverRequest' }
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Receiver' }
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
  /receivers/{receiverId}:
    get:
      operationId: getReceiver
      summary: Get a receiver
      parameters:
        - { name: receiverId, in: path, required: true, schema: { type: string } }
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Receiver' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }
    patch:
      operationId: updateReceiver
      summary: Update a receiver (admin only)
      parameters:
        - { name: receiverId, in: path, required: true, schema: { type: string } }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/UpdateReceiverRequest' }
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Receiver' }
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }
    delete:
      operationId: archiveReceiver
      summary: Archive a receiver (admin only)
      parameters:
        - { name: receiverId, in: path, required: true, schema: { type: string } }
      responses:
        '204': { description: No Content }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }
  /receivers/{receiverId}/trackers:
    get:
      operationId: listTrackers
      summary: List a receiver's trackers
      parameters:
        - { name: receiverId, in: path, required: true, schema: { type: string } }
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: array
                items: { $ref: '#/components/schemas/Tracker' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }
    post:
      operationId: createTracker
      summary: Create a tracker for a receiver (admin only)
      parameters:
        - { name: receiverId, in: path, required: true, schema: { type: string } }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/TrackerWrite' }
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Tracker' }
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }
  /trackers/{trackerId}:
    get:
      operationId: getTracker
      summary: Get a tracker
      parameters:
        - { name: trackerId, in: path, required: true, schema: { type: string } }
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Tracker' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }
    patch:
      operationId: updateTracker
      summary: Update a tracker (admin only)
      parameters:
        - { name: trackerId, in: path, required: true, schema: { type: string } }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/TrackerWrite' }
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Tracker' }
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }
    delete:
      operationId: archiveTracker
      summary: Archive a tracker (admin only)
      parameters:
        - { name: trackerId, in: path, required: true, schema: { type: string } }
      responses:
        '204': { description: No Content }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }
  /trackers/{trackerId}/events:
    get:
      operationId: listEvents
      summary: List a tracker's events, newest first (paginated)
      parameters:
        - { name: trackerId, in: path, required: true, schema: { type: string } }
        - {
            name: limit,
            in: query,
            required: false,
            schema: { type: integer, minimum: 1, maximum: 100 },
          }
        - { name: cursor, in: query, required: false, schema: { type: string } }
        - { name: from, in: query, required: false, schema: { type: string, format: date-time } }
        - { name: to, in: query, required: false, schema: { type: string, format: date-time } }
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema: { $ref: '#/components/schemas/EventList' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }
    post:
      operationId: logEvent
      summary: Log an event against a tracker
      parameters:
        - { name: trackerId, in: path, required: true, schema: { type: string } }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/EventWrite' }
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Event' }
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }
  /trackers/{trackerId}/events/{eventId}:
    get:
      operationId: getEvent
      summary: Get a single event
      parameters:
        - { name: trackerId, in: path, required: true, schema: { type: string } }
        - { name: eventId, in: path, required: true, schema: { type: string } }
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Event' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }
    patch:
      operationId: updateEvent
      summary: Edit a logged event
      parameters:
        - { name: trackerId, in: path, required: true, schema: { type: string } }
        - { name: eventId, in: path, required: true, schema: { type: string } }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/EventWrite' }
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Event' }
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }
    delete:
      operationId: deleteEvent
      summary: Delete a logged event
      parameters:
        - { name: trackerId, in: path, required: true, schema: { type: string } }
        - { name: eventId, in: path, required: true, schema: { type: string } }
      responses:
        '204': { description: No Content }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }
  /tracker-templates:
    get:
      operationId: listTrackerTemplates
      summary: List the seeded tracker-template catalog
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: array
                items: { $ref: '#/components/schemas/TrackerTemplate' }
        '401': { $ref: '#/components/responses/Unauthorized' }
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: Cognito-issued JWT access token, validated by the API Gateway JWT authorizer.
  schemas:
    Health:
      type: object
      required: [status, version, timestamp]
      properties:
        status:
          type: string
          enum: [ok, degraded]
        version:
          type: string
          example: '0.1.0'
        timestamp:
          type: string
          format: date-time
    Flags:
      type: object
      additionalProperties: true
      example:
        flags_demo:
          enabled: false
    Role:
      type: string
      enum: [admin, caregiver]
    User:
      type: object
      required: [user_id, email, name, created_at]
      properties:
        user_id: { type: string }
        email: { type: string, format: email }
        name: { type: string }
        created_at: { type: string, format: date-time }
    MembershipView:
      type: object
      required: [care_group_id, name, role]
      properties:
        care_group_id: { type: string }
        name: { type: string }
        role: { $ref: '#/components/schemas/Role' }
    Me:
      type: object
      required: [user, memberships]
      properties:
        user: { $ref: '#/components/schemas/User' }
        memberships:
          type: array
          items: { $ref: '#/components/schemas/MembershipView' }
    CreateCareGroupRequest:
      type: object
      required: [name]
      properties:
        name: { type: string, minLength: 1, maxLength: 100 }
    CareGroupMembership:
      type: object
      required: [care_group_id, name, role]
      properties:
        care_group_id: { type: string }
        name: { type: string }
        role: { $ref: '#/components/schemas/Role' }
    CreateInvitationRequest:
      type: object
      required: [email, role]
      properties:
        email: { type: string, format: email }
        role: { $ref: '#/components/schemas/Role' }
    Invitation:
      type: object
      required: [token, email, role, expires_at]
      properties:
        token: { type: string }
        email: { type: string, format: email }
        role: { $ref: '#/components/schemas/Role' }
        expires_at: { type: string, format: date-time }
    PendingInvitation:
      type: object
      required: [token, care_group_id, care_group_name, role, invited_by]
      properties:
        token: { type: string }
        care_group_id: { type: string }
        care_group_name: { type: string }
        role: { $ref: '#/components/schemas/Role' }
        invited_by: { type: string }
    AcceptInvitationResponse:
      type: object
      required: [care_group_id, role]
      properties:
        care_group_id: { type: string }
        role: { $ref: '#/components/schemas/Role' }
    TrackerKind:
      type: string
      enum: [event, measurement, scheduled]
    FieldType:
      type: string
      enum: [number, text, boolean, enum, datetime]
    Threshold:
      type: object
      properties:
        min: { type: number }
        max: { type: number }
    Field:
      type: object
      required: [key, label, type]
      properties:
        key: { type: string }
        label: { type: string }
        type: { $ref: '#/components/schemas/FieldType' }
        unit: { type: string }
        required: { type: boolean }
        options:
          type: array
          items: { type: string }
        threshold: { $ref: '#/components/schemas/Threshold' }
    Receiver:
      type: object
      required: [receiver_id, care_group_id, name, created_by, created_at, archived]
      properties:
        receiver_id: { type: string }
        care_group_id: { type: string }
        name: { type: string }
        date_of_birth: { type: string }
        created_by: { type: string }
        created_at: { type: string, format: date-time }
        archived: { type: boolean }
    CreateReceiverRequest:
      type: object
      required: [name]
      properties:
        name: { type: string, minLength: 1, maxLength: 200 }
        date_of_birth: { type: string }
    UpdateReceiverRequest:
      type: object
      properties:
        name: { type: string, minLength: 1, maxLength: 200 }
        date_of_birth: { type: string }
    Tracker:
      type: object
      required:
        [
          tracker_id,
          receiver_id,
          care_group_id,
          name,
          kind,
          fields,
          created_by,
          created_at,
          archived,
        ]
      properties:
        tracker_id: { type: string }
        receiver_id: { type: string }
        care_group_id: { type: string }
        name: { type: string }
        kind: { $ref: '#/components/schemas/TrackerKind' }
        icon: { type: string }
        color: { type: string }
        fields:
          type: array
          items: { $ref: '#/components/schemas/Field' }
        created_by: { type: string }
        created_at: { type: string, format: date-time }
        archived: { type: boolean }
    TrackerWrite:
      type: object
      required: [name, kind, fields]
      properties:
        name: { type: string, minLength: 1, maxLength: 200 }
        kind: { $ref: '#/components/schemas/TrackerKind' }
        icon: { type: string }
        color: { type: string }
        fields:
          type: array
          items: { $ref: '#/components/schemas/Field' }
    TrackerTemplate:
      type: object
      required: [template_id, name, kind, fields]
      properties:
        template_id: { type: string }
        name: { type: string }
        kind: { $ref: '#/components/schemas/TrackerKind' }
        icon: { type: string }
        color: { type: string }
        fields:
          type: array
          items: { $ref: '#/components/schemas/Field' }
    Breach:
      type: object
      required: [key, value, bound, limit]
      properties:
        key: { type: string }
        value: { type: number }
        bound: { type: string, enum: [min, max] }
        limit: { type: number }
    Event:
      type: object
      required:
        [
          tracker_id,
          event_id,
          care_group_id,
          receiver_id,
          values,
          occurred_at,
          logged_by,
          created_at,
        ]
      properties:
        tracker_id: { type: string }
        event_id: { type: string }
        care_group_id: { type: string }
        receiver_id: { type: string }
        values:
          type: object
          additionalProperties: true
        note: { type: string }
        occurred_at: { type: string, format: date-time }
        logged_by: { type: string }
        created_at: { type: string, format: date-time }
        breaches:
          type: array
          items: { $ref: '#/components/schemas/Breach' }
    EventWrite:
      type: object
      required: [values]
      properties:
        occurred_at: { type: string, format: date-time }
        values:
          type: object
          additionalProperties: true
        note: { type: string }
    EventList:
      type: object
      required: [items]
      properties:
        items:
          type: array
          items: { $ref: '#/components/schemas/Event' }
        next_cursor: { type: string }
    Error:
      type: object
      required: [message]
      properties:
        message: { type: string }
  responses:
    BadRequest:
      description: Bad request
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    Unauthorized:
      description: Missing or invalid token
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    Forbidden:
      description: Not permitted
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    NotFound:
      description: Not found
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    Conflict:
      description: Conflict (duplicate)
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    Gone:
      description: Invitation expired or already used
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
